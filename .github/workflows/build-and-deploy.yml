name: Build and deploy Ipswich Facts

on:
  schedule:
    # Every day at 06:00 UTC (~16:00 Brisbane)
    - cron: '0 6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Parser tests run before anything touches the network. They pin the
  # scrapers against saved Council responses, so an upstream markup change
  # (or our own regression) fails here instead of quietly publishing an
  # empty site. Cheap: no network, ~1s.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/ -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      # Capital works (data/capital_works/) is committed, not scraped here:
      # budgets change once a year — see `make backfill-capworks`.
      - name: Scrape
        run: |
          python -m scrape.civic_projects --out data/projects.json
          python -m scrape.road_closures --out data/closures.json
          python -m scrape.council_meetings --out data/meetings.json
          python -m scrape.ipswich_first --out data/news.json

      # The hourly closures workflow reuses this instead of re-hitting
      # infocouncil every hour (that would be ~4k requests/day at Council).
      - name: Cache meetings data for hourly builds
        uses: actions/cache/save@v4
        with:
          path: data/meetings.json
          key: meetings-${{ github.run_id }}

      # Same deal for Ipswich First — the hourly build reuses today's news
      # instead of re-hitting the WordPress API every hour.
      - name: Cache news data for hourly builds
        uses: actions/cache/save@v4
        with:
          path: data/news.json
          key: news-${{ github.run_id }}

      - name: Build
        # --strict: refuse to publish if a scraper silently returned nothing
        # (upstream markup change). Failing here keeps the last good deploy.
        run: python -m build.build_site --data data --out site --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
