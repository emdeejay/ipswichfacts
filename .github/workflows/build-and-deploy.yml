name: Build and deploy Ipswich Facts

on:
  schedule:
    # Every day at 06:00 UTC (~16:00 Brisbane)
    - cron: '0 6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install
        run: pip install -r requirements.txt

      - name: Scrape
        run: |
          python -m scrape.civic_projects --out data/projects.json
          python -m scrape.road_closures --out data/closures.json

      - name: Build
        run: python -m build.build_site --data data --out site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
